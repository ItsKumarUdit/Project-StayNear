<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup - StayNear</title>
    <link rel="stylesheet" href="RegisterStyle.css">
    <script defer src="RegisterScript.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="form-container">
            <h2>Login</h2>
            <form id="login-form">
                <input type="tel" id="login-mobile" placeholder="Mobile Number" pattern="[0-9]{10}" required>
                <div class="password-container">
                    <input type="password" id="login-password" placeholder="Password" required>
                    <span class="toggle-password" data-target="login-password">👁️</span>
                </div>
                <button type="submit">Login</button>
            </form>
            <p>Don't have an account? <a href="#" id="show-signup">Sign Up</a></p>
        </div>
        
        <div class="form-container hidden" id="signup-container">
            <h2>Sign Up</h2>
            <form id="signup-form">
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="text" id="signup-mobile" placeholder="Mobile Number" required>
                <div class="password-container">
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <span class="toggle-password" data-target="signup-password">👁️</span>
                </div>
                <select id="signup-role">
                    <option value="student">Student</option>
                    <option value="owner">Hostel Owner</option>
                </select>
                <button type="submit">Sign Up</button>
            </form>
        </div>
        <a href="index.html" class="back-button">⬅ Back to Home</a>
    </div>
 
    
</body>
</html>
